<div class="row g-2 mb-4 align-items-end animate-fade-in">
  
  <div class="col-12 col-md-4">
    <label class="form-label fw-bold text-secondary ms-1 mb-1 small">Búsqueda</label>
    <div class="input-group">
      <span class="input-group-text bg-white border-secondary">🔍</span>
      <input type="text" class="form-control border-secondary fw-bold" placeholder="Nombre o ID..." [(ngModel)]="busqueda" (input)="buscar()">
    </div>
  </div>

  <div class="col-6 col-md-2">
    <label class="form-label fw-bold text-secondary ms-1 mb-1 small">Región</label>
    <select class="form-select border-secondary text-secondary fw-bold" 
            [(ngModel)]="regionSeleccionada" 
            (change)="aplicarFiltros()">
      <option value="all">Pokedex nacional</option>
      <option value="kanto">Kanto (1)</option>
      <option value="johto">Johto (2)</option>
      <option value="hoenn">Hoenn (3)</option>
      <option value="sinnoh">Sinnoh (4)</option>
      <option value="teselia">Teselia (5)</option>
      <option value="kalos">Kalos (6)</option>
      <option value="alola">Alola (7)</option>
      <option value="galar">Galar (8)</option>
      <option value="paldea">Paldea (9)</option>
    </select>
  </div>

  <div class="col-6 col-md-2">
     <label class="form-label fw-bold text-secondary ms-1 mb-1 small">Tipo</label>
     <select class="form-select border-secondary text-secondary fw-bold text-capitalize" 
             [(ngModel)]="tipoSeleccionado" 
             (change)="aplicarFiltros()">
      <option value="all">Todos</option>
      <option *ngFor="let t of listaTipos" [value]="t.name">{{ t.name }}</option>
    </select>
  </div>

  <div class="col-12 col-md-3">
     <label class="form-label fw-bold text-secondary ms-1 mb-1 small">Ordenación</label>
     <select class="form-select border-secondary text-secondary fw-bold" 
             [(ngModel)]="ordenActual" 
             (change)="aplicarFiltros()">
      <option value="id-asc">Num. Ascendente</option>
      <option value="id-desc">Num. Descendente</option>
      <option value="name-asc">Nombre (A-Z)</option>
      <option value="name-desc">Nombre (Z-A)</option>
    </select>
  </div>

  <div class="col-12 col-md-1" *ngIf="busqueda !== '' || regionSeleccionada !== 'all' || tipoSeleccionado !== 'all' || ordenActual !== 'id-asc'">
      <label class="form-label d-none d-md-block mb-1 small">&nbsp;</label> 
      <button 
          class="btn btn-danger w-100 border-secondary fw-bold mt-2 mt-md-0" 
          (click)="resetearFiltros()" 
          title="Borrar Filtros">
          Limpiar
      </button>
  </div>
</div>

<div *ngIf="cargando" class="text-center py-5">
  <div class="loader"></div>
  <h3 class="mt-4 text-muted fs-5">Atrapando Pokémon...</h3>
</div>

<div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-3 row-cols-xxl-4 g-4" *ngIf="!cargando">
  <div class="col" *ngFor="let poke of pokemonsVisibles">
    <div class="card h-100 border-0 shadow-sm poke-card" [routerLink]="['/pokemon', poke.id]">
      
      <div class="d-none d-md-block h-100">
        <div *ngIf="userService.isLoggedIn() && !esAdmin" 
             class="pokeball-btn"
             [class.atrapado]="esCapturado(poke.id)"
             (click)="toggleCaptura(poke.id, $event)"
             title="Capturar / Liberar">
        </div>
        
        <div class="card-body text-center p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
             <span class="badge bg-light text-secondary border fs-6">#{{ poke.id }}</span>
          </div>
          <div class="img-circle-container mx-auto mb-3">
            <img [src]="poke.image" [alt]="poke.name" class="img-fluid" loading="lazy">
          </div>
          <h3 class="fw-bold text-dark text-capitalize mb-3">{{ poke.name }}</h3>
          <div class="d-flex justify-content-center gap-2 flex-wrap">
            <span *ngFor="let t of poke.types" class="badge rounded-pill border border-light px-3 py-2" [style.background-color]="getColor(t.type.name)" style="font-size: 0.9rem;">
              {{ t.type.name }}
            </span>
          </div>
        </div>
      </div>

      <div class="d-block d-md-none h-100 position-relative" [style.background-color]="poke.types && poke.types.length > 0 ? getColor(poke.types[0].type.name) : '#f8f9fa'">
        <div class="position-absolute w-100 h-100" style="background-color: rgba(255,255,255,0.5); left: 0; top: 0; pointer-events: none;"></div>
        
        <div class="row m-0 h-100 align-items-center position-relative">
          <div class="col-8 p-3 z-1">
            <div class="d-flex align-items-center gap-2 mb-2">
              <span class="text-dark fw-bold" style="opacity: 0.6;">#{{ poke.id }}</span>
              <h5 class="fw-bold text-dark text-capitalize mb-0" style="font-size: 1.1rem; text-shadow: 1px 1px 2px rgba(255,255,255,0.5);">{{ poke.name }}</h5>
              
              <div *ngIf="userService.isLoggedIn() && !esAdmin" 
                   class="pokeball-btn-mobile ms-1"
                   [class.atrapado]="esCapturado(poke.id)"
                   (click)="toggleCaptura(poke.id, $event)">
              </div>
            </div>

            <div class="d-flex gap-2 flex-wrap">
              <span *ngFor="let t of poke.types" 
                    class="badge border border-dark text-dark px-2 py-1 bg-transparent" 
                    style="border-radius: 20px; opacity: 0.6; font-size: 0.7rem;">
                {{ t.type.name | uppercase }}
              </span>
            </div>
          </div>

          <div class="col-4 p-0 position-relative d-flex justify-content-end align-items-center h-100" style="min-height: 100px;">
            <div class="position-absolute bg-white" style="width: 140%; height: 180%; border-radius: 50%; right: -40%; opacity: 0.5;"></div>
            <img [src]="poke.image" [alt]="poke.name" class="img-fluid position-relative pe-2" loading="lazy" style="max-height: 85px; z-index: 1;">
          </div>
          
        </div>
      </div>

    </div>
  </div>
</div>

<div *ngIf="!cargando && pokemonsVisibles.length === 0" class="text-center mt-5">
  <h3 class="text-muted">No se encontraron resultados.</h3>
  <button class="btn btn-outline-danger mt-3" (click)="resetearFiltros()">Limpiar filtros</button>
</div>

<div class="text-center py-4" *ngIf="cargandoMas">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Cargando más Pokémon...</span>
  </div>
</div>

<div class="text-center mt-5 mb-5" *ngIf="!cargando && !cargandoMas && pokemonsVisibles.length > 0 && pokemonsVisibles.length >= listaFiltrada.length">
    <span class="text-muted small">Has llegado al final de la lista.</span>
</div>

<button class="btn-scroll-top"
        [class.show]="mostrarBotonSubir"
        (click)="subirArriba()">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
        <path fill-rule="evenodd" d="M8 15a.5.5 0 0 0 .5-.5V2.707l3.146 3.147a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 1 0 .708.708L7.5 2.707V14.5a.5.5 0 0 0 .5.5z"/>
    </svg>
</button>
